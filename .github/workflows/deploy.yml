name: Deploy static site

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  check-infra-changes:
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for infrastructure changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "infra=true" >> "$GITHUB_OUTPUT"
          elif git diff --quiet "${{ github.event.before }}" "${{ github.sha }}" -- infra/; then
            echo "infra=false" >> "$GITHUB_OUTPUT"
          else
            echo "infra=true" >> "$GITHUB_OUTPUT"
          fi

  deploy-infra:
    needs: check-infra-changes
    if: needs.check-infra-changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-skip-session-tagging: true

      - name: Deploy infrastructure (CloudFormation)
        run: |
          aws cloudformation deploy \
            --template-file infra/cloudformation.yaml \
            --stack-name "${{ vars.STACK_NAME }}" \
            --parameter-overrides \
              DomainName="${{ vars.DOMAIN_NAME }}" \
              HostedZoneId="${{ vars.HOSTED_ZONE_ID }}" \
            --capabilities CAPABILITY_IAM \
            --no-fail-on-empty-changeset

  deploy-site:
    needs: [check-infra-changes, deploy-infra]
    if: |
      always() &&
      (needs.deploy-infra.result == 'success' || needs.deploy-infra.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build SvelteKit site
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-skip-session-tagging: true

      - name: Get stack outputs
        id: stack
        run: |
          BUCKET=$(aws cloudformation describe-stacks --stack-name "${{ vars.STACK_NAME }}" \
            --query "Stacks[0].Outputs[?OutputKey=='BucketName'].OutputValue" --output text)
          DIST_ID=$(aws cloudformation describe-stacks --stack-name "${{ vars.STACK_NAME }}" \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" --output text)
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "dist_id=$DIST_ID" >> "$GITHUB_OUTPUT"

      - name: Sync build output to S3
        run: |
          aws s3 sync ./build "s3://${{ steps.stack.outputs.bucket }}" --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.stack.outputs.dist_id }}" \
            --paths "/*"
